# A generic, single database configuration.

[alembic]
# path to migration scripts.
script_location = alembic

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

path_separator = os

# We load URL dynamically in env.py, but this acts as placeholder
sqlalchemy.url = postgresql+asyncpg://postgres:postgres_secure_password@localhost/platform_db

[post_write_hooks]
# format using "black"
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
