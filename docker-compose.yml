version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: platform_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password
      POSTGRES_DB: platform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d platform_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: platform_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - platform_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: platform_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - SECRET_KEY=949f2b1d5a7d4722883cb0a84e3d36cf793c13ff24729fcfd468160bc72a4ffc
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=platform_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_password
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=mock-openai-key-value
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform_network

networks:
  platform_network:
    driver: bridge

volumes:
  postgres_data:
